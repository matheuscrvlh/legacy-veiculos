services:
  backend:
    build: ./backend
    container_name: legacy-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-legacy_veiculos_secret_key_2025}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/veiculos"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: legacy-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  backend-data:
  backend-uploads:

networks:
  app-network:
    driver: bridge
