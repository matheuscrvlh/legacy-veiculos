name: legacy

services:
  backend:
    build: ./backend
    container_name: legacy-backend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-legacy_veiculos_secret_key_2025}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/veiculos"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: legacy-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  backend-data:
    name: backend-data
  backend-uploads:
    name: backend-uploads

networks:
  app-network:
    driver: bridge
